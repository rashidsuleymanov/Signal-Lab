name: signal-lab

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signal_lab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signal_lab_password}
      POSTGRES_DB: ${POSTGRES_DB:-signal_lab}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      app: signal-lab
    volumes:
      - ./apps/backend:/app/apps/backend
      - ./prisma:/app/prisma
      - backend_node_modules:/app/apps/backend/node_modules
    command: sh -lc "npm run prisma:generate && npm run prisma:migrate:deploy && npm run start:dev"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${FRONTEND_PORT:-3000}
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-3001}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - frontend_node_modules:/app/apps/frontend/node_modules
    command: sh -lc "npm run dev -- --port 3000 --hostname 0.0.0.0"

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  loki:
    image: grafana/loki:3.5.0
    command:
      - "-config.file=/etc/loki/config.yml"
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
    ports:
      - "3101:3100"

  promtail:
    image: grafana/promtail:3.5.0
    command:
      - "-config.file=/etc/promtail/config.yml"
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:12.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  pg_data:
  backend_node_modules:
  frontend_node_modules:
  grafana_data:
